<div class="page-wrapper bg-gra-03 p-t-45 p-b-50">
<div class="wrapper wrapper--w790">
<div class="card card-5">
<div class="card-heading">
<h2 class="title">Registration Form</h2>
</div>
<div class="card-body">

<!-- ================= YANGI QO'SHILGAN QISM: Xatolik bo'lsa, qizil rasmda ko'rinadi ================= -->
{% if error %}
    <div style="background-color: #f8d7da; color: #721c24; padding: 15px; border: 1px solid #f5c6cb; border-radius: 5px; text-align: center; margin-bottom: 20px; font-weight: bold;">
        {{ error }}
    </div>
{% endif %}
<!-- ============================================================================================= -->

<form method="POST" action="{% url 'register' %}">
    {% csrf_token %}
<div class="form-row m-b-55">
<div class="name">Name</div>
<div class="value">
<div class="row row-space">
<div class="col-2">
<div class="input-group-desc">
<input class="input--style-5" type="text" name="first_name">
<label class="label--desc">first name</label>
</div>
</div>
<div class="col-2">
<div class="input-group-desc">
<input class="input--style-5" type="text" name="last_name">
<label class="label--desc">last name</label>
</div>
</div>
</div>
</div>
</div>
<div class="form-row">
<div class="name">Email</div>
<div class="value">
<div class="input-group">
<input class="input--style-5" type="email" name="email">
</div>
</div>
</div>
<div class="form-row m-b-55">
<div class="name">Phone</div>
<div class="value">
<div class="row row-refine">
<div class="col-3">
<div class="input-group-desc">
<input class="input--style-5" type="text" name="area_code">
<label class="label--desc">Area Code</label>
</div>
</div>
 <div class="col-9">
<div class="input-group-desc">
<input class="input--style-5" type="text" name="phone">
<label class="label--desc">Phone Number</label>
</div>
</div>
</div>
</div>
</div>
<div class="form-row">
<div class="name">Sabab</div>
<div class="value">
<div class="input-group">
<div class="rs-select2 js-select-simple select--no-search">
<select name="subject">
<option disabled="disabled" selected="selected">Nima uchun bu saytga kirmoqchisiz.</option>
<option>Kitob o'qish uchun.</option>
<option>Shunchaki kirib kormoqchiman.</option>
<option>Qanaqa kitoblar borligini kormoqchiman.</option>
</select>
<div class="select-dropdown"></div>
</div>
</div>
</div>
</div>
<div class="form-row p-t-20">
<label class="label label--block">Bu saytga avval kirganmisiz?</label>
<div class="p-t-15">
<label class="radio-container m-r-55">Ha
<input type="radio" checked="checked" name="exist">
<span class="checkmark"></span>
</label>
<label class="radio-container">Yo'q
<input type="radio" name="exist">
<span class="checkmark"></span>
</label>
</div>
</div>
<div>
<button class="btn btn--radius-2 btn--red" type="submit">Register</button>
</div>
</form>
</div>
</div>
</div>
</div>
